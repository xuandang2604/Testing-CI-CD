name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Chạy workflow mỗi khi có code mới push lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code từ GitHub về máy ảo của GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Bước 2: Cài đặt Docker Buildx (công cụ hỗ trợ build image hiện đại của Docker)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Bước 3: Đăng nhập vào Docker Hub thông qua GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Build và Push image lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Sử dụng tags: tag 'latest' và tag theo mã SHA của commit để dễ dàng quản lý phiên bản
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/testing-ci-cd:latest
            ${{ secrets.DOCKER_USERNAME }}/testing-ci-cd:${{ github.sha }}
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="xuandang2604/testing-ci-cd"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
