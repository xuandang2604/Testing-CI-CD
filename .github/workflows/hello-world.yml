name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Chạy workflow mỗi khi có code mới push lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code từ GitHub về máy ảo của GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Bước 2: Cài đặt Docker Buildx (công cụ hỗ trợ build image hiện đại của Docker)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Bước 3: Đăng nhập vào Docker Hub thông qua GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Build và Push image lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Sử dụng tags: tag 'latest' và tag theo mã SHA của commit để dễ dàng quản lý phiên bản
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/testing-ci-cd:latest
            ${{ secrets.DOCKER_USERNAME }}/testing-ci-cd:${{ github.sha }}

