<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{auth-layout}">
<head>
    <title>Đăng ký</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-card">
        <!-- Brand -->
        <div class="auth-card__brand">
            <div class="auth-card__brand-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="auth-card__title">Tạo tài khoản</h1>
            <p class="auth-card__subtitle">Đăng ký để mua sắm và nhận ưu đãi.</p>
        </div>

        <!-- Validation Errors -->
        <div th:if="${errors}" class="auth-alert auth-alert--error">
            <i class="fa-solid fa-circle-exclamation" style="margin-top:2px;"></i>
            <ul>
                <li th:each="error : ${errors}" th:text="${error}"></li>
            </ul>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" method="post" th:object="${user}">
            <div class="auth-form-group">
                <label class="auth-form-label" for="email">Email</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" class="auth-input" id="email" name="email"
                           placeholder="example@email.com" required>
                </div>
            </div>

            <div class="auth-form-group">
                <label class="auth-form-label" for="username">Tên đăng nhập</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" class="auth-input" id="username" name="username"
                           placeholder="Nhập tên đăng nhập" required>
                </div>
            </div>

            <div class="auth-form-group">
                <label class="auth-form-label" for="password">Mật khẩu</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" class="auth-input" id="password" name="password"
                           placeholder="Tạo mật khẩu mạnh" required>
                </div>
            </div>

            <div class="auth-form-group">
                <label class="auth-form-label" for="phone">Số điện thoại</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-phone input-icon"></i>
                    <input type="tel" class="auth-input" id="phone" name="phone"
                           placeholder="0xxxxxxxxx" maxlength="10">
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-user-plus" style="margin-right:6px;"></i> Tạo tài khoản
            </button>
        </form>

        <div class="auth-switch">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </div>
    </div>
</div>
</body>
</html>
