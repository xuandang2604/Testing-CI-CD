<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{auth-layout}">
<head>
    <title>Đăng nhập</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-card">
        <!-- Brand -->
        <div class="auth-card__brand">
            <div class="auth-card__brand-icon">
                <i class="fa-solid fa-user"></i>
            </div>
            <h1 class="auth-card__title">Đăng nhập</h1>
            <p class="auth-card__subtitle">Chào mừng bạn trở lại! Vui lòng đăng nhập.</p>
        </div>

        <!-- Error / Success Alerts -->
        <div th:if="${param.error}" class="auth-alert auth-alert--error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>Tên đăng nhập hoặc mật khẩu không đúng.</span>
        </div>
        <div th:if="${param.logout}" class="auth-alert auth-alert--success">
            <i class="fa-solid fa-circle-check"></i>
            <span>Bạn đã đăng xuất thành công.</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="auth-form-group">
                <label class="auth-form-label" for="username">Tên đăng nhập</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" class="auth-input" id="username" name="username"
                           placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
            </div>

            <div class="auth-form-group">
                <label class="auth-form-label" for="password">Mật khẩu</label>
                <div class="auth-input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" class="auth-input" id="password" name="password"
                           placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <div class="auth-remember">
                <input type="checkbox" id="remember-me" name="remember-me">
                <label for="remember-me">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fa-solid fa-right-to-bracket" style="margin-right:6px;"></i> Đăng nhập
            </button>
        </form>

        <div class="auth-switch">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</div>
</body>
</html>
