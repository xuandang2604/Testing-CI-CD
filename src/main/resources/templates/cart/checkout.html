<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${title} ?: 'Thanh toán'">Tiến hành đặt hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .checkout-wrapper {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 40px;
            margin-top: 40px;
            margin-bottom: 60px;
        }
        .form-control:focus {
            border-color: #d70018;
            box-shadow: 0 0 0 0.25rem rgba(215, 0, 24, 0.25);
        }
        .btn-submit-order {
            background-color: #d70018;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-submit-order:hover {
            background-color: #bf0015;
            color: white;
        }
        a.back-link {
            text-decoration: none;
            color: #6c757d;
        }
        a.back-link:hover {
            color: #d70018;
        }

        /* CSS cho phần chọn phương thức thanh toán */
        .payment-option {
            border: 2px solid #eaeaea;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .payment-option:hover {
            border-color: #d70018;
            background-color: #fff9f9;
        }
        /* Hiệu ứng khi radio được chọn */
        .payment-option input[type="radio"]:checked + .option-content {
            font-weight: bold;
            color: #d70018;
        }
        .payment-option input[type="radio"]:checked {
            accent-color: #d70018;
        }
        .points-highlight { color: #f1c40f; font-weight: 700; }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="container checkout-wrapper" style="max-width: 700px;">
        <h2 class="text-center fw-bold text-dark mb-4">Thông tin giao hàng</h2>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

        <form th:action="@{/order/submit}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="customerName" class="form-label fw-semibold">Họ và tên *</label>
                    <input type="text" id="customerName" name="customerName" class="form-control form-control-lg" placeholder="Nhập họ và tên" required>
                </div>

                <div class="col-md-6">
                    <label for="phoneNumber" class="form-label fw-semibold">Số điện thoại *</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control form-control-lg" placeholder="Nhập số điện thoại" required>
                </div>

                <div class="col-12">
                    <label for="address" class="form-label fw-semibold">Địa chỉ nhận hàng *</label>
                    <input type="text" id="address" name="address" class="form-control form-control-lg" placeholder="Số nhà, tên đường, phường/xã..." required>
                </div>

                <div class="col-12">
                    <label for="note" class="form-label fw-semibold">Ghi chú thêm (Tùy chọn)</label>
                    <textarea id="note" name="note" class="form-control" rows="2" placeholder="Ví dụ: Giao ngoài giờ hành chính..."></textarea>
                </div>
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Dùng voucher</h6>
                        <div class="d-flex gap-2">
                            <input type="text" name="voucherCode" class="form-control" placeholder="Nhập mã voucher (VD: VCH-ABC12345)">
                            <button type="submit"
                                    class="btn btn-outline-danger"
                                    th:formaction="@{/order/checkout/apply-voucher}"
                                    formmethod="post"
                                    formnovalidate>
                                Áp dụng
                            </button>
                        </div>
                        <div class="mt-2" th:if="${voucherCode != null and voucherCode != ''}">
                            <span class="badge bg-success">Đang áp dụng: <span th:text="${voucherCode}">VCH-XXXX</span></span>
                            <button type="submit"
                                    class="btn btn-sm btn-outline-secondary"
                                    style="margin-left:8px;"
                                    th:formaction="@{/order/checkout/remove-voucher}"
                                    formmethod="post"
                                    formnovalidate>
                                Gỡ
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-12 mt-4">
                    <div class="border rounded p-3 bg-light">
                        <div class="d-flex justify-content-between">
                            <span>Tạm tính</span>
                            <strong th:text="${#numbers.formatDecimal(cartSubTotal,0,'COMMA',0,'POINT')} + '₫'">0₫</strong>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <span>Phí giao hàng</span>
                            <strong th:text="${#numbers.formatDecimal(shippingFee,0,'COMMA',0,'POINT')} + '₫'">0₫</strong>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <span>Điểm thưởng tích lũy (không tính ship)</span>
                            <strong class="points-highlight" th:text="${rewardPoints} + ' điểm'">0</strong>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <span>Giảm từ điểm</span>
                            <strong th:text="'-' + ${#numbers.formatDecimal(rewardDiscount,0,'COMMA',0,'POINT')} + '₫'">0₫</strong>
                        </div>
                        <div class="d-flex justify-content-between mt-2" th:if="${voucherDiscount > 0}">
                            <span>Giảm từ voucher</span>
                            <strong class="text-success" th:text="'-' + ${#numbers.formatDecimal(voucherDiscount,0,'COMMA',0,'POINT')} + '₫'">0₫</strong>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fs-5">
                            <span class="fw-bold">Tổng thanh toán</span>
                            <strong class="text-danger" th:text="${#numbers.formatDecimal(cartTotalAmount,0,'COMMA',0,'POINT')} + '₫'">0₫</strong>
                        </div>
                    </div>
                </div>

                <div class="col-12 mt-4">
                    <label class="form-label fw-bold fs-5 border-bottom pb-2 mb-3 w-100">Phương thức thanh toán</label>
                    <div class="d-flex flex-column gap-3">

                        <label class="payment-option d-flex align-items-center m-0">
                            <input type="radio" name="paymentMethod" value="COD" class="form-check-input me-3 mt-0" style="width: 20px; height: 20px;" checked>
                            <div class="option-content d-flex align-items-center w-100">
                                <img src="https://cdn-icons-png.flaticon.com/512/2800/2800156.png" alt="COD" style="width: 35px; height: 35px; margin-right: 15px;">
                                <span>Thanh toán khi nhận hàng (COD)</span>
                            </div>
                        </label>

                        <label class="payment-option d-flex align-items-center m-0">
                            <input type="radio" name="paymentMethod" value="MOMO" class="form-check-input me-3 mt-0" style="width: 20px; height: 20px;">
                            <div class="option-content d-flex align-items-center w-100">
                                <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" alt="MoMo" style="width: 35px; height: 35px; border-radius: 8px; margin-right: 15px;">
                                <span>Thanh toán qua Ví MoMo</span>
                            </div>
                        </label>

                    </div>
                </div>
            </div>

            <div class="d-grid mt-5">
                <button type="submit" class="btn btn-submit-order">Tiến hành đặt hàng</button>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/cart}" class="back-link">← Quay lại giỏ hàng</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
