<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Đặt hàng thành công</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Khối card thông báo căn giữa */
        .confirmation-wrapper {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 50px 30px;
            margin-top: 60px;
            margin-bottom: 80px;
            text-align: center;
        }

        /* Icon tick xanh cho nó uy tín */
        .success-icon {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
        }

        /* Nút quay lại mua sắm chuẩn tone đỏ */
        .btn-continue {
            background-color: #d70018;
            color: white !important;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 8px;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-continue:hover {
            background-color: #bf0015;
            box-shadow: 0 4px 10px rgba(215, 0, 24, 0.3);
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="container d-flex justify-content-center">
        <div class="confirmation-wrapper col-12 col-md-8 col-lg-6">

            <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" alt="Success" class="success-icon">

            <h2 class="text-success fw-bold mb-3">Đặt hàng thành công!</h2>

            <p class="fs-5 fw-medium text-dark mb-2" th:text="${message}">Your order has been successfully placed.</p>

            <p class="text-muted mb-5">
                Cảm ơn bạn đã tin tưởng và mua sắm tại cửa hàng của chúng tôi.<br>
                Đơn hàng của bạn đang được xử lý và sẽ sớm được giao.
            </p>

            <a th:href="@{/products}" class="btn btn-continue">
                TIẾP TỤC MUA SẮM
            </a>

        </div>
    </div>
</section>
</body>
</html>
